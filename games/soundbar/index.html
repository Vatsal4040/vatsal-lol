<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sound Bar | VATSAL.LOL</title>
  <link rel="canonical" href="https://vatsal.lol/games/soundbar/">
  <meta property="og:url" content="https://vatsal.lol/games/soundbar/">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../../assets/vatsal-header-v25.css">
  <link rel="stylesheet" href="../../assets/vatsal-footer-v25.css">
  <link rel="stylesheet" href="../../assets/mobile-v3.css">
  <link rel="stylesheet" href="./style.css">
  
  <meta name="description" content="Generate beautiful sounds and beats on the premium interactive sound board on VATSAL.LOL. No install, no login - just fun!">
  <meta property="og:site_name" content="vatsal.lol">
  <meta property="og:title" content="Sound Bar | VATSAL.LOL">
  <meta property="og:description" content="Generate beautiful sounds and beats on the premium interactive sound board on VATSAL.LOL. No install, no login - just fun!">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://vatsal.lol/assets/logo.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Sound Bar | VATSAL.LOL">
  <meta name="twitter:description" content="Generate beautiful sounds and beats on the premium interactive sound board on VATSAL.LOL. No install, no login - just fun!">
  <meta name="twitter:image" content="https://vatsal.lol/assets/logo.png">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
</head>
<body>
  <header class="vatsal-header" id="vatsalHeader">
    <a class="vatsal-home" href="https://vatsal.lol/">vatsal.lol</a>
  </header>

  <div id="eclipse-dim-overlay" class="eclipse-dim-overlay"></div>

  <main class="app-container">
    
    <!-- Central Title Banner -->
    <h1 class="app-title">Sound Bar</h1>
     <div class="divider" style="margin-top: 2px;"></div>

    <!-- Music Player Section -->
    <header class="player-header">
      <div class="player-title">🎵 Music</div>
      
      <div class="player-controls-row">
        <!-- Playlist Category Select -->
        <select id="playlist-select" class="song-select playlist-dropdown">
          <option value="English">English</option>
          <option value="Bollywood">Bollywood</option>
          <option value="Old Dad Car Songs">Old Dad Car Songs</option>
        </select>

        <!-- Song Select (Dynamic) -->
        <select id="song-select" class="song-select song-dropdown">
          <!-- Populated by script.js -->
        </select>
      </div>

      <div class="player-playback-row">
        <div class="playback-buttons">
          <button id="prev-btn" class="control-btn" title="Previous">⏮</button>
          <button id="play-btn" class="control-btn play-pause-btn" title="Play/Pause">▶</button>
          <button id="next-btn" class="control-btn" title="Next">⏭</button>
        </div>
        <div id="volume-badge" class="volume-badge">Volume: 63%</div>
      </div>
    </header>

    <div class="divider"></div>

    <!-- Active Controller Section (visually dominates) -->
    <section class="controller-viewport">
      <div id="controller-area" class="controller-area">
        <!-- Loaded controller mounts here -->
      </div>
    </section>

    <div class="divider"></div>

    <!-- Controller Picker Tray Section -->
    <section class="picker-viewport">
      <div id="controller-picker" class="controller-picker">
        <!-- Emoji buttons generated by script.js -->
      </div>
    </section>

    <div class="divider"></div>

  </main>

  <!-- Load remaining active controllers globally (CORS-less local support) -->
  <script src="controllers/default.js"></script>
  <script src="controllers/vertical.js"></script>
  <script src="controllers/ball.js"></script>
  <script src="controllers/eclipse.js"></script>
  <script src="controllers/pencil.js"></script>
  <script src="controllers/pump.js"></script>
  <script src="controllers/dj.js"></script>
  <script src="controllers/dice.js"></script>
  <script src="controllers/exam.js"></script>
  <script src="controllers/rocket.js"></script>
  <script src="controllers/elevator.js"></script>
  <script src="controllers/thermometer.js"></script>
  <script src="controllers/battery.js"></script>
  <script src="controllers/dart.js"></script>
  <script src="controllers/archery.js"></script>
  <script src="controllers/crane.js"></script>
  <script src="controllers/coffee.js"></script>
  <script src="controllers/slot.js"></script>

  <!-- Load main script -->
  <script src="script.js"></script>
  <script src="../../assets/vatsal-footer-v25.js" defer></script>
  <script>
    // Automatically trigger recommendations after a few seconds of playing sounds
    setTimeout(() => {
      window.VatsalLolGameComplete?.();
    }, 6000);
  </script>
</body>
</html>
