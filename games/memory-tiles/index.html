<body>
<header class="vatsal-header" id="vatsalHeader">
  <a class="vatsal-home" href="https://vatsal.lol/">
    vatsal.lol
  </a>
</header>
<section id="startScreen">

    <div class="start-content">

        <h1>Memory Tiles Challenge</h1>

        <div class="instructions">

            <h2>🧠 HOW TO PLAY</h2>

            <p>Memorize the blue tiles before they disappear.</p>

            <p>Tap every tile you remember.</p>

            <p>Three mistakes ends the round.</p>

            <p>Correct tiles = Blue</p>

            <p>Wrong tiles = Red</p>

            <p>
                Difficulty increases automatically.
            </p>

        </div>

        <button onclick="startBraining()"> 🧠 Braining Mode   </button>

        <button onclick="openTraining()"> 🎯 Training Mode    </button>

        <button onclick="startVivekanand()"> 🧘 Vivekanand Mode   </button>

    </div>

</section>
<div id="app" style="display:none">
    
    <div id="top">
        <div id="phase">Memorize</div>
        <div id="info"></div>
    </div>
    <button id="hintBtn" onclick="useHint()">💡 Hint</button>
    <div id="grid"></div>
</div>
<div id="overlay" style="display:none"></div>
<script src="script.js"></script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')

          .catch(err => console.error('Service Worker registration failed', err));
