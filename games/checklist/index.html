<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Life Checklist</title>
<link rel="canonical" href="https://vatsal.lol/games/checklist/">
<meta property="og:url" content="https://vatsal.lol/games/checklist/">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%E2%9C%85%3C%2Ftext%3E%3C%2Fsvg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/vatsal-header-v25.css">
<link rel="stylesheet" href="../../assets/vatsal-footer-v25.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="../../assets/mobile-v3.css">
</head>
<body>
<header class="vatsal-header">
    <a class="vatsal-home" href="../../index.html">vatsal.lol</a>
</header>
<div class="container">
<header class="sticky-header">
    <h1>Life Checklist</h1>

    <div class="counter">
        You’ve completed
        <span id="count">0</span>/<span id="total">0</span>
        items
    </div>

    <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
    </div>
</header>
<div class="grid" id="grid"></div>
<div class="timeline-wrap">
    <div class="timeline">
        <div class="stage">
            <div class="dot"><span>👶</span></div>
            <div>childhood</div>
        </div>
        <div class="stage">
            <div class="dot"><span>🧃</span></div>
            <div>teenage years</div>
        </div>
        <div class="stage">
            <div class="dot"><span>🧠</span></div>
            <div>adulthood</div>
        </div>
        <div class="stage">
            <div class="dot"><span>👴</span></div>
            <div>old age</div>
        </div>
    </div>
    <div class="ending" id="ending">
        Still buffering through existence.
    </div>
</div>
</div>
<div class="footer-glow"></div>
<script src="../../assets/vatsal-footer-v25.js" defer></script>
<script src="script.js"></script>
</body>
</html>
