<body>
<header class="vatsal-header">
    <a class="vatsal-home" href="../../index.html">vatsal.lol</a>
</header>
<div class="container">
<header class="sticky-header">
    <h1>Life Checklist</h1>

    <div class="counter">
        You’ve completed
        <span id="count">0</span>/<span id="total">0</span>
        items
    </div>

    <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
    </div>
</header>
<div class="grid" id="grid"></div>
<div class="timeline-wrap">
    <div class="timeline">
        <div class="stage">
            <div class="dot"><span>👶</span></div>
            <div>childhood</div>
        </div>
        <div class="stage">
            <div class="dot"><span>🧃</span></div>
            <div>teenage years</div>
        </div>
        <div class="stage">
            <div class="dot"><span>🧠</span></div>
            <div>adulthood</div>
        </div>
        <div class="stage">
            <div class="dot"><span>👴</span></div>
            <div>old age</div>
        </div>
    </div>
    <div class="ending" id="ending">
        Still buffering through existence.
    </div>
</div>
</div>
<div class="footer-glow"></div>
<script src="../../assets/vatsal-footer-v25.js" defer></script>
<script src="script.js"></script>
  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('Service Worker registered', reg))
          .catch(err => console.error('Service Worker registration failed', err));
      });
    }
  </script>
</body>
