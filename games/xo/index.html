<head>

<meta property="og:image" content="../../assets/logo.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Tic Tac Toe | vatsal.lol">

<link rel="stylesheet" href="../../assets/vatsal-footer-v25.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="../../assets/mobile-v3.css">
</head>
<body>
<header class="vatsal-header">
    <a href="/" class="vatsal-home">vatsal.lol</a>
</header> 
  <!-- START -->
<div id="startScreen" class="screen active">
  <section class="title-section">
    <h1 class="game-title">Tic Tac Toe</h1>
    <h2 class="section-title">Choose Symbol</h2>
</section>
  <button data-symbol="X" onclick="selectSymbol('X')">Play as X</button>
  <button data-symbol="O" onclick="selectSymbol('O')">Play as O</button>
  <h2>Difficulty</h2>
  <button data-difficulty="easy" onclick="setDifficulty('easy')">Easy 😌</button>
  <button data-difficulty="draw" onclick="setDifficulty('draw')">Draw ⚖️</button>
  <p id="info"></p>
  <button onclick="startGameFinal()">Start Game</button>
</div>
<!-- GAME -->
<div id="gameScreen" class="screen">
  <div class="top">
    <div><img id="playerAvatar"><p>You</p></div>
    <div><img id="aiAvatar"><p>AI 🤖</p></div>
  </div>
  <p id="status" aria-live="polite"></p>
  <div id="board" class="board"></div>
<section id="resultSection" hidden aria-live="polite">
    <h2 id="resultText"></h2>

    <button onclick="playAgain()">
        Play Again
    </button>
</section>
  <button onclick="restart()">Restart</button>
</div>
<script src="script.js" defer></script>
<script src="../../assets/vatsal-footer-v25.js" defer></script>
</body>
</html>
