<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Emoji → Movie Guess</title>
<link rel="canonical" href="https://vatsal.lol/games/emojis-2-movies/">
<meta property="og:url" content="https://vatsal.lol/games/emojis-2-movies/">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%F0%9F%8E%A5%3C%2Ftext%3E%3C%2Fsvg%3E">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/vatsal-header-v25.css">
<link rel="stylesheet" href="../../assets/vatsal-footer-v25.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="../../assets/mobile-v3.css">
</head>
<body>
<header class="vatsal-header" id="siteHeader">
    <a class="vatsal-home" href="../../index.html">vatsal.lol</a>
</header>
<div class="bg"></div>
<div class="particles" id="particles"></div>
<!-- START SCREEN -->
<div class="start-screen" id="startScreen">
    <div class="start-inner">
        <div class="title">EMOJI → MOVIE GUESS</div>
       <div class="subtitle">
        Guess the movie from emojis 🎬<br>
❤️ 4 Lives &nbsp;&nbsp; 🔥 Build Combos
</div>
       <!-- <div class="how compact-how">
    <p>🎬 Guess the movie from emojis.</p>
    <p>❤️ 4 lives only.</p>
    <p>🔥 Higher streak = higher score.</p>
    <p>Use hints when the options get tricky.</p>
</div>--> 

        <div class="mode-buttons">
            <button class="mode-btn hollywood" onclick="startGame('hollywood')">
                🎬 HOLLYWOOD MODE
            </button>
            <button class="mode-btn bollywood" onclick="startGame('bollywood')">
                🎥 BOLLYWOOD MODE
            </button>
        </div>
    </div>
</div>
<!-- GAME SCREEN -->
<div class="game-screen" id="gameScreen">
    <div class="topbar">
        <div class="logo" id="modeTitle">
            HOLLYWOOD MODE
        </div>
        <div class="stats">
            <div class="stat">
                Score
                <span id="score">0</span>
            </div>
            <div class="stat">
                Combo
                <span id="combo">0x</span>
            </div>
            <div class="stat">
                Lives
                <span id="lives">❤️❤️❤️❤️</span>
            </div>
        </div>
    </div>
<div class="guess-title">
    GUESS THE MOVIE
</div>
    <div class="game-area">
        <div class="quiz-card">
            <div class="emoji" id="emoji">🦁👑</div>
            <div class="timer">
                <div class="timer-bar" id="timerBar"></div>
            </div>
            <div class="options-grid" id="optionsGrid"></div>
            <div class="controls">
                <button class="small-btn" onclick="showHint()">
                    💡 Hint
                </button>
                <button class="small-btn" onclick="skipQuestion()">
                    ⏭ Skip
                </button>
            </div>
            <div class="message" id="message"></div>
        </div>
    </div>
</div>
<!-- SCORE SCREEN -->
<div class="score-screen" id="scoreScreen">
    <div class="score-inner">
        <div class="score-title">
            GAME OVER
        </div>
        <div class="summary">
            <div class="summary-box">
                <h3>Score</h3>
                <span id="finalScore">0</span>
            </div>
            <div class="summary-box">
                <h3>Correct</h3>
                <span id="correctCount">0</span>
            </div>
            <div class="summary-box">
                <h3>Wrong</h3>
                <span id="wrongCount">0</span>
            </div>
            <div class="summary-box">
                <h3>Attempts</h3>
                <span id="attemptCount">0</span>
            </div>
        </div>
        <div class="remark" id="remark">
            Hollywood Genius 🎬
        </div>
        <div class="history" id="history"></div>
        <button class="restart" onclick="restartGame()">
            PLAY AGAIN
        </button>
    </div>
</div>
<script src="script.js" defer></script>
<script src="../../assets/vatsal-footer-v25.js" defer></script>
</body>
</html>
