<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Flash Memory Challenge</title>
<link rel="canonical" href="https://vatsal.lol/games/flash-memory/">
<meta property="og:url" content="https://vatsal.lol/games/flash-memory/">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="../../assets/vatsal-v4.css">
<link rel="stylesheet" href="../../assets/mobile-v3.css">
<meta name="description" content="Play Flash Memory instantly on VATSAL.LOL. No install, no login - just fun!">
<meta property="og:site_name" content="vatsal.lol">
<meta property="og:title" content="Flash Memory Challenge | vatsal.lol">
<meta property="og:description" content="Play instant mini games on vatsal.lol.">
<meta property="og:type" content="website">
<meta property="og:image" content="../../assets/logo.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Flash Memory Challenge | vatsal.lol">
<meta name="twitter:description" content="Play instant mini games on vatsal.lol.">
  <meta name="theme-color" content="#000000">
  <meta name="twitter:image" content="https://vatsal.lol/assets/logo.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
</head>
<body>


<div id="game">

  <!-- MODE SELECT SCREEN -->
  <div id="menuScreen">
    <div class="menu-title">FLASH<br>MEMORY</div>
    <div class="menu-sub">How many digits can your brain hold?</div>
    <div class="mode-grid">
      <button class="mode-card" onclick="startGame(3)">
        <span class="mode-digit">3</span>
        <span class="mode-label">THREE DIGIT</span>
        <span class="mode-hint">Beginner</span>
      </button>
      <button class="mode-card" onclick="startGame(4)">
        <span class="mode-digit">4</span>
        <span class="mode-label">FOUR DIGIT</span>
        <span class="mode-hint">Standard</span>
      </button>
      <button class="mode-card" onclick="startGame(5)">
        <span class="mode-digit">5</span>
        <span class="mode-label">FIVE DIGIT</span>
        <span class="mode-hint">Expert</span>
      </button>
    </div>
    <div class="menu-rules">
      5 wrong answers = game over · speed increases every 5 correct
    </div>
  </div>

  <!-- PLAY SCREEN -->
  <div id="playScreen" class="hidden">
    <div id="hud">
      <div id="livesDisplay"></div>
      <div id="hudScore">0</div>
      <div id="speedDisplay">—</div>
    </div>
    <div id="number"></div>
   <div id="inputBox">
      <div id="answerDisplay"></div>
      <input id="input" autocomplete="off" inputmode="none" pattern="[0-9]*" style="position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;">
      <div id="numpad">
        <button class="np-btn" data-digit="1">1</button>
        <button class="np-btn" data-digit="2">2</button>
        <button class="np-btn" data-digit="3">3</button>
        <button class="np-btn" data-digit="4">4</button>
        <button class="np-btn" data-digit="5">5</button>
        <button class="np-btn" data-digit="6">6</button>
        <button class="np-btn" data-digit="7">7</button>
        <button class="np-btn" data-digit="8">8</button>
        <button class="np-btn" data-digit="9">9</button>
        <button class="np-btn" id="np-del">⌫</button>
        <button class="np-btn" data-digit="0">0</button>
      </div>
    </div>
    <div id="meta">Q: 0 · R: 0 · W: 0</div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="resultScreen" class="hidden">
    <div class="result-title">GAME OVER</div>
    <div id="resultScore"></div>
    <div id="resultMeta"></div>
    <div id="resultRemark"></div>
    <div class="result-actions">
      <button class="result-btn primary" id="replayBtn">REPLAY</button>
      <button class="result-btn" id="modeBtn">MODE SELECT</button>
    </div>
    <div id="footerSlot"></div>
  </div>

</div>

<script src="script.js"></script>
<script src="../../assets/vatsal-sdk.js" defer></script>
  <!-- PWA Service Worker Registration & Update Notification -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => {
            console.log('Service Worker registered', reg);
            
            // Check for updates
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  showUpdateToast(reg);
                }
              });
            });

            // If there's already a waiting worker
            if (reg.waiting) {
              showUpdateToast(reg);
            }
          })
          .catch(err => console.error('Service Worker registration failed', err));
      });

      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });
    }

    function showUpdateToast(reg) {
      if (document.getElementById('pwa-update-toast')) return;
      
      const toast = document.createElement('div');
      toast.id = 'pwa-update-toast';
      toast.style.cssText = `
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: rgba(10, 10, 20, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        padding: 16px 20px;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        z-index: 10000;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        max-width: 320px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        box-sizing: border-box;
      `;

      if (window.innerWidth < 768) {
        toast.style.left = '20px';
        toast.style.right = '20px';
        toast.style.bottom = '20px';
        toast.style.maxWidth = 'calc(100% - 40px)';
      }

      toast.innerHTML = `
        <div style="font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px;">
          <span style="width: 8px; height: 8px; background: #5500ff; border-radius: 50%;"></span>
          Update Available
        </div>
        <div style="color: #aaa; font-size: 13px; line-height: 1.4;">A new version of VATSAL.LOL is available.</div>
        <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 4px;">
          <button id="pwa-later-btn" style="background: transparent; border: none; color: #aaa; font-weight: 500; cursor: pointer; padding: 6px 12px; font-size: 13px; outline: none;">Later</button>
          <button id="pwa-refresh-btn" style="background: #fff; border: none; color: #000; font-weight: 600; cursor: pointer; padding: 6px 16px; border-radius: 8px; font-size: 13px; outline: none; box-shadow: 0 2px 8px rgba(255,255,255,0.2);">Refresh</button>
        </div>
      `;

      document.body.appendChild(toast);

      document.getElementById('pwa-later-btn').onclick = () => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      };

      document.getElementById('pwa-refresh-btn').onclick = () => {
        if (reg.waiting) {
          reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        }
      };
    }
  </script>

</body>
</html>
