<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PADDLE CLUB</title>
<link rel="canonical" href="https://vatsal.lol/games/paddleclub/">
<meta property="og:url" content="https://vatsal.lol/games/paddleclub/">
<link rel="icon" href="🏓" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="../../assets/vatsal-header-v25.css">
<link rel="stylesheet" href="../../assets/vatsal-footer-v25.css">
<link rel="stylesheet" href="../../assets/mobile-v3.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/logo.png">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Play Paddle Club instantly on VATSAL.LOL. No install, no login - just fun!">
  <meta property="og:title" content="Paddle Club | VATSAL.LOL">
  <meta property="og:description" content="Play Paddle Club instantly on VATSAL.LOL. No install, no login - just fun!">
  <meta property="og:image" content="https://vatsal.lol/assets/logo.png">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="vatsal.lol">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Paddle Club | VATSAL.LOL">
  <meta name="twitter:description" content="Play Paddle Club instantly on VATSAL.LOL. No install, no login - just fun!">
  <meta name="twitter:image" content="https://vatsal.lol/assets/logo.png">
</head>
<body>
<header class="vatsal-header">
    <a class="vatsal-home" href="https://vatsal.lol/">vatsal.lol</a>
</header>

<!-- MENU SCREEN -->
<section id="menuScreen" class="screen active">
  <div class="screen-body center">
    <h1>PADDLE CLUB</h1>
    <div class="emoji">🏓</div>
    <button id="onePlayerBtn" class="btn primary">1 PLAYER</button>
    <button id="twoPlayerBtn" class="btn secondary">2 PLAYER</button>
   <p class="subtitle">
    Bounce the ball past your opponent.<br>
    First to 10 points wins.<br>
    Desktop: W/S or Arrow Keys • Mobile: Drag your paddle.
    </p>
  </div>
</section>

<!-- DIFFICULTY SCREEN -->
<section id="difficultyScreen" class="screen">
  <div class="screen-body center">
    <h2>SELECT AI LEVEL</h2>
    <button class="btn primary difficulty-btn" data-level="easy">EASY<span>Slow reactions</span></button>
    <button class="btn primary difficulty-btn" data-level="medium">MEDIUM<span>Balanced gameplay</span></button>
    <button class="btn primary difficulty-btn" data-level="hard">HARD<span>Predictive AI</span></button>
    <button id="backBtn" class="btn ghost">BACK</button>
  </div>
</section>

<!-- GAME SCREEN -->
<section id="gameScreen" class="screen">
  <div class="game-wrap">
    <div class="hud">
      <span id="hudLeft">PLAYER 1</span>
      <div id="scoreDisplay" class="score">00 : 00</div>
      <span id="hudRight">PLAYER 2</span>
    </div>
    <div id="controlsInfo" class="controls-box"></div>
    <canvas id="gameCanvas" width="900" height="520"></canvas>
    <button id="pauseBtn" class="pause-btn" aria-label="Pause">⏸</button>
  </div>
</section>

<!-- PAUSE SCREEN -->
<section id="pauseScreen" class="screen">
  <div class="screen-body center">
    <h2>PAUSED</h2>
    <button id="resumeBtn" class="btn primary">RESUME</button>
    <button id="restartBtn" class="btn secondary">RESTART</button>
    <button id="menuBtn" class="btn ghost">MAIN MENU</button>
  </div>
</section>

<!-- WIN SCREEN -->
<section id="winScreen" class="screen">
  <div class="screen-body center">
    <div class="trophy">🏆</div>
    <h2 id="winnerText"></h2>
    <p id="finalScore" class="final-score"></p>
    <button id="playAgainBtn" class="btn primary">PLAY AGAIN</button>
    <button id="winMenuBtn" class="btn secondary">MAIN MENU</button>
  </div>
</section>

<script src="script.js"></script>
<script src="../../assets/vatsal-footer-v25.js" defer></script>
  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('Service Worker registered', reg))
          .catch(err => console.error('Service Worker registration failed', err));
      });
    }
  </script>
</body>
</html>
