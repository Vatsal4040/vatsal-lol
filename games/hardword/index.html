<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../../assets/vatsal-v4.css">
<link rel="stylesheet" href="../../assets/mobile-v3.css">
<meta name="description" content="Play HardWord instantly on VATSAL.LOL. No install, no login - just fun!">
<meta property="og:site_name" content="vatsal.lol">
<meta property="og:title" content="HARDWORD | vatsal.lol">
<meta property="og:description" content="Play instant mini games on vatsal.lol.">
<meta property="og:type" content="website">
<meta property="og:image" content="../../assets/logo.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="HARDWORD | vatsal.lol">
<meta name="twitter:description" content="Play instant mini games on vatsal.lol.">

  <meta name="twitter:image" content="https://vatsal.lol/assets/logo.png">
  <link rel="manifest" href="/manifest.json">

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">

<body>
<!-- LANDING -->
<div id="landing">
    <h1>HARDWORD</h1>
    <div class="daily-status" id="dailyStatus"></div>
    <div class="mode-select">
        <button class="mode-btn" onclick="startGame('daily')">DAILY</button>
        <button class="mode-btn" onclick="startGame('infinite')">INFINITE</button>
    </div>
</div>
<!-- GAME -->
<div id="game-app" style="display:none">
    <div class="header">
        <div class="title">
            <h1>HARDWORD</h1>
            <div class="mode-label" id="modeLabel"></div>
            <div class="answer-bar" id="answerBar"></div>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <div class="tooltip">?
                <div class="tooltip-box">
                    <strong>How to Play</strong><br><br>
                    Guess the 4-letter word in 8 tries.<br><br>
                    🟢 = correct letter & position<br>
                    🟡 = correct letter, wrong position<br><br>
                    Letters never repeat.
                </div>
            </div>
            <button class="next-btn" id="statsBtn" onclick="openStatsModal()">STATS</button>
            <button class="next-btn" id="nextBtn" onclick="nextWordGame()" style="display:none">NEXT WORD</button>
        </div>
    </div>
    <div class="game-container">
        <div>
            <div class="guess-board" id="board"></div>
            <div class="keyboard">
                <div class="krow">
                    <div class="key">Q</div><div class="key">W</div><div class="key">E</div><div class="key">R</div>
                    <div class="key">T</div><div class="key">Y</div><div class="key">U</div><div class="key">I</div>
                    <div class="key">O</div><div class="key">P</div>
                </div>
                <div class="krow">
                    <div class="key">A</div><div class="key">S</div><div class="key">D</div><div class="key">F</div>
                    <div class="key">G</div><div class="key">H</div><div class="key">J</div><div class="key">K</div>
                    <div class="key">L</div>
                </div>
                <div class="krow">
                    <div class="key wide">ENT</div>
                    <div class="key">Z</div><div class="key">X</div><div class="key">C</div>
                    <div class="key">V</div><div class="key">B</div><div class="key">N</div><div class="key">M</div>
                    <div class="key wide">⌫</div>
                </div>
           </div>
        </div>
    </div>
    <div class="result-screen" id="resultScreen">
        <h2 id="resultTitle"></h2>
        <div class="result-answer" id="resultAnswer"></div>
        <button class="next-btn-result daily-only" id="shareBtn" onclick="shareResults()">SHARE RESULTS</button>
        <button class="next-btn-result infinite-only" id="playAgainBtn" onclick="nextWordGame()">PLAY AGAIN</button>
        <div class="countdown daily-only" id="countdown"></div>
    </div>
    <div class="stats-modal" id="statsModal">
        <div class="stats-modal-inner">
            <button class="close-modal" onclick="closeStatsModal()">✕</button>
            <h2>STATISTICS</h2>
            <div class="stats-grid">
                <div class="stat-box"><span id="modalPlayed"></span><label>Played</label></div>
                <div class="stat-box"><span id="modalWinPct"></span><label>Win %</label></div>
                <div class="stat-box"><span id="modalStreak"></span><label>Streak</label></div>
                <div class="stat-box"><span id="modalMaxStreak"></span><label>Max Streak</label></div>
            </div>
        </div>
    </div>
</div>
<input id="mobile-input" type="text" autocapitalize="characters" />
<script src="script.js"></script>
  <!-- PWA Service Worker Registration & Update Notification -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => {
            console.log('Service Worker registered', reg);
            
            // Check for updates
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  showUpdateToast(reg);
                }
              });
            });

            // If there's already a waiting worker
            if (reg.waiting) {
              showUpdateToast(reg);
            }
          })
          .catch(err => console.error('Service Worker registration failed', err));
      });

      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });
    }

    function showUpdateToast(reg) {
      if (document.getElementById('pwa-update-toast')) return;
      
      const toast = document.createElement('div');
      toast.id = 'pwa-update-toast';
      toast.style.cssText = `
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: rgba(10, 10, 20, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        padding: 16px 20px;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        z-index: 10000;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        max-width: 320px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        box-sizing: border-box;
      `;

      if (window.innerWidth < 768) {
        toast.style.left = '20px';
        toast.style.right = '20px';
        toast.style.bottom = '20px';
        toast.style.maxWidth = 'calc(100% - 40px)';
      }

      toast.innerHTML = `
        <div style="font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px;">
          <span style="width: 8px; height: 8px; background: #5500ff; border-radius: 50%;"></span>
          Update Available
        </div>
        <div style="color: #aaa; font-size: 13px; line-height: 1.4;">A new version of VATSAL.LOL is available.</div>
        <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 4px;">
          <button id="pwa-later-btn" style="background: transparent; border: none; color: #aaa; font-weight: 500; cursor: pointer; padding: 6px 12px; font-size: 13px; outline: none;">Later</button>
          <button id="pwa-refresh-btn" style="background: #fff; border: none; color: #000; font-weight: 600; cursor: pointer; padding: 6px 16px; border-radius: 8px; font-size: 13px; outline: none; box-shadow: 0 2px 8px rgba(255,255,255,0.2);">Refresh</button>
        </div>
      `;

      document.body.appendChild(toast);

      document.getElementById('pwa-later-btn').onclick = () => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      };

      document.getElementById('pwa-refresh-btn').onclick = () => {
        if (reg.waiting) {
          reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        }
      };
    }
  </script>

<script src="../../assets/vatsal-sdk.js" defer></script>
</body>
</html>
