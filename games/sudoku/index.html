<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sudoku Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../assets/vatsal-v4.css">
<link rel="stylesheet" href="../../assets/mobile-v3.css">
<link rel="stylesheet" href="style.css" />
  <link rel="canonical" href="https://vatsal.lol/games/sudoku/">
  <meta property="og:url" content="https://vatsal.lol/games/sudoku/">
  <meta name="description" content="Play Sudoku instantly on VATSAL.LOL. No install, no login - just fun!">
  <meta property="og:site_name" content="vatsal.lol">
  <meta property="og:title" content="Sudoku Digital | vatsal.lol">
  <meta property="og:description" content="Play Sudoku instantly on VATSAL.LOL. No install, no login - just fun!">
  <meta property="og:type" content="website">
  <meta property="og:image" content="../../assets/logo.png">
  <meta name="twitter:card" content="summary">
</head>
<body>

  <!-- Level Selection -->
  <section class="v-screen active" id="levelScreen">
    <div class="v-body">
      <h1 style="font-size: 3rem; letter-spacing: 8px; margin: 40px 0 10px;">SUDOKU</h1>
      <p style="color: #444; letter-spacing: 2px; margin-bottom: 50px;">NEURAL INTERFACE READY</p>
      
      <button class="level-btn btn-os" data-level="easy" style="width: 240px; padding: 20px; font-size: 1.2rem;">4x4 EASY</button>
      <button class="level-btn btn-os" data-level="medium" style="width: 240px; padding: 20px; font-size: 1.2rem;">6x6 MEDIUM</button>
      <button class="level-btn btn-os" data-level="hard" style="width: 240px; padding: 20px; font-size: 1.2rem;">9x9 HARD</button>
    </div>
  </section>

  <!-- Main Game -->
  <section class="v-screen" id="gameScreen">
    <div class="v-body">
      
      <div class="hud-bar">
        <span id="levelBadge">SECTOR: EASY</span>
        <span id="timer">0:00</span>
      </div>

      <div class="board-wrapper">
        <div id="board" class="board"></div>
      </div>

      <div class="action-bar">
        <button id="hintBtn" class="btn-os">HINT <span id="hintCount"></span></button>
        <button id="solveBtn" class="btn-os">OVERRIDE</button>
        <button id="newGameBtn" class="btn-os">REBOOT</button>
        <button id="changeLevelBtn" class="btn-os">EXIT</button>
      </div>

      <div class="number-pad" id="numberPad">
        <button class="num-btn" data-num="1">1</button>
        <button class="num-btn" data-num="2">2</button>
        <button class="num-btn" data-num="3">3</button>
        <button class="num-btn" data-num="4">4</button>
        <button class="num-btn" data-num="5">5</button>
        <button class="num-btn" data-num="6">6</button>
        <button class="num-btn" data-num="7">7</button>
        <button class="num-btn" data-num="8">8</button>
        <button class="num-btn" data-num="9">9</button>
        <button class="num-btn num-btn-clear" data-num="0">CLEAR</button>
      </div>

    </div>

    <!-- Win Modal -->
    <div class="win-banner hidden" id="winBanner">
      <h2 style="color: #00e5ff; font-size: 2rem;">TASK COMPLETE</h2>
      <p id="winTime" class="digital" style="font-size: 1.5rem; margin-bottom: 30px;">0:00</p>
      <button id="playAgainBtn" class="btn-os" style="padding: 15px 40px; font-size: 1rem;">REBOOT SYSTEM</button>
    </div>
  </section>

  <script src="script.js"></script>
<script src="../../assets/vatsal-sdk.js" defer></script>
</body>
</html>
