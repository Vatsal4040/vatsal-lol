<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
/>
<title>Stack Tower</title>
<link rel="canonical" href="https://vatsal.lol/games/stacking/">
<meta property="og:url" content="https://vatsal.lol/games/stacking/">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%F0%9F%92%A9%3C%2Ftext%3E%3C%2Fsvg%3E">
<link rel="stylesheet" href="../../assets/vatsal-header-v25.css">
<link rel="stylesheet" href="../../assets/vatsal-footer-v25.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="../../assets/mobile-v3.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/logo.png">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Play Stacking instantly on VATSAL.LOL. No install, no login - just fun!">
  <meta property="og:title" content="Stacking | VATSAL.LOL">
  <meta property="og:description" content="Play Stacking instantly on VATSAL.LOL. No install, no login - just fun!">
  <meta property="og:image" content="https://vatsal.lol/assets/logo.png">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="vatsal.lol">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Stacking | VATSAL.LOL">
  <meta name="twitter:description" content="Play Stacking instantly on VATSAL.LOL. No install, no login - just fun!">
  <meta name="twitter:image" content="https://vatsal.lol/assets/logo.png">
</head>
<body>
<header class="vatsal-header" id="siteHeader">
    <a class="vatsal-home" href="../../index.html">vatsal.lol</a>
</header>
<canvas id="game"></canvas>
<div class="hud">
    <div class="topbar">
        <div class="logo">
            STACK <span>TOWER</span>
        </div>
        <div class="score-wrap">
            <div class="card">
                <div class="label">SCORE</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="card">
                <div class="label">COMBO</div>
                <div class="value" id="comboCount">0x</div>
            </div>
        </div>
    </div>
    <div class="center-msg">
        <div class="combo" id="comboText">PERFECT</div>
        <div class="perfect" id="perfectText">
            + PRECISION BONUS
        </div>
    </div>
    <div class="bottom">
        CLICK / TAP TO DROP
    </div>
    <div class="start-screen" id="menu">
        <h1 class="start-title">STACK<br><span>TOWER</span></h1>
        <p class="start-desc">
            Drop blocks so clean the CPU gets emotional.<br>
            Perfect landings trigger slow-mo, combo heat,<br>
            wobble physics, and a tiny neon panic audit.<br>
            Watch for gold MAGNET blocks — they auto-lock perfect.
        </p>
        <button id="startBtn">
            BOOT STACK.EXE
        </button>
    </div>
</div>
<div class="flash" id="flash"></div>
<script src="script.js" defer></script>
<script src="../../assets/vatsal-footer-v25.js" defer></script>
  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('Service Worker registered', reg))
          .catch(err => console.error('Service Worker registration failed', err));
      });
    }
  </script>
</body>
</html>
