<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Guess & Challenge</title>
    <link rel="canonical" href="https://vatsal.lol/games/which-number/">
<meta property="og:url" content="https://vatsal.lol/games/which-number/">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../assets/vatsal-header-v25.css">
<link rel="stylesheet" href="../../assets/mobile-v3.css">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Play Which Number instantly on VATSAL.LOL. No install, no login - just fun!">
  <meta property="og:title" content="Which Number | VATSAL.LOL">
  <meta property="og:description" content="Play Which Number instantly on VATSAL.LOL. No install, no login - just fun!">
  <meta property="og:image" content="https://vatsal.lol/assets/logo.png">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="vatsal.lol">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Which Number | VATSAL.LOL">
  <meta name="twitter:description" content="Play Which Number instantly on VATSAL.LOL. No install, no login - just fun!">
  <meta name="twitter:image" content="https://vatsal.lol/assets/logo.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
</head>
<body>
 <header class="vatsal-header">
      <a class="vatsal-home" href="https://vatsal.lol/">vatsal.lol</a>
    </header>
    <main class="app">

        <!-- START SCREEN -->
        <section id="startScreen" class="screen active">

      <div class="game-wrap">

                <h1>GUESS & CHALLENGE</h1>

                <p id="modeDescription" class="description">
                    Find the hidden number before you run out of attempts.
                </p>

                <!-- MODE -->
                <div class="section">
                    <h2>Mode</h2>

                    <div class="mode-toggle">
                        <button class="mode-btn active" data-mode="guess">
                            Guess The Number
                        </button>

                        <button class="mode-btn" data-mode="challenge">
                            Challenge The AI
                        </button>
                    </div>
                </div>

                <!-- DIFFICULTY -->
                <div class="section">
                    <h2>Difficulty</h2>

                    <div class="difficulty-selector">
                        <button class="difficulty-btn active"
                                data-range="100"
                                data-attempts="10">
                            Easy
                        </button>

                        <button class="difficulty-btn"
                                data-range="500"
                                data-attempts="12">
                            Medium
                        </button>

                        <button class="difficulty-btn"
                                data-range="1000"
                                data-attempts="15">
                            Hard
                        </button>
                    </div>

                    <div id="difficultyInfo" class="difficulty-info">
                        1–100 • 10 tries
                    </div>
                </div>

                <button id="playBtn" class="play-btn">
                    PLAY
                </button>

            </div>

        </section>


        <!-- GUESS THE NUMBER -->
        <section id="guessScreen" class="screen">

            <div class="card">

                <h1>Guess The Number</h1>

                <div id="attemptInfo" class="attempt-info" aria-live="polite">
                    Attempts: 0 / 10
                </div>

                <div class="guess-input-row">
                    <input
                        type="text"
                        id="guessInput"
                        inputmode="none"
                        readonly
                        aria-label="Enter your guess"
                        placeholder="Enter Number"
                    >

                    <button id="guessBtn">
                        Guess
                    </button>
                </div>
                
<div id="guessHistory" class="history" aria-live="polite">
                </div>

                <div id="numpad" class="numpad">
                    <button class="num-btn" data-num="1">1</button>
                    <button class="num-btn" data-num="2">2</button>
                    <button class="num-btn" data-num="3">3</button>
                    <button class="num-btn" data-num="4">4</button>
                    <button class="num-btn" data-num="5">5</button>
                    <button class="num-btn" data-num="6">6</button>
                    <button class="num-btn" data-num="7">7</button>
                    <button class="num-btn" data-num="8">8</button>
                    <button class="num-btn" data-num="9">9</button>
                    <button class="num-btn clear-btn" id="numClear">C</button>
                    <button class="num-btn" data-num="0">0</button>
                    <button class="num-btn backspace-btn" id="numBackspace">⌫</button>
                </div>

                

                <button class="home-btn">
                    Home
                </button>

            </div>

        </section>


        <!-- CHALLENGE AI -->
        <section id="challengeScreen" class="screen">

            <div class="card">

                <h1>Challenge The AI</h1>

                <div id="rangeInfo" class="range-info">
                    Range: 1 - 100
                </div>

               <div id="chatHistory" class="chat-history" aria-live="polite">
                </div>

                <div id="currentGuess" class="current-guess" aria-live="polite">
                    Is your number 50?
                </div>

                <div class="response-buttons">

                    <button id="lowerBtn">
                        Lower
                    </button>

                    <button id="correctBtn">
                        Correct
                    </button>

                    <button id="higherBtn">
                        Higher
                    </button>

                </div>

                <button class="home-btn">
                    Home
                </button>

            </div>

        </section>


        <!-- RESULT SCREEN -->
        <section id="resultScreen" class="screen">

            <div class="card">

                <h1 id="resultTitle">
                    Result
                </h1>

                <p id="resultText" aria-live="polite">
                </p>

                <div class="result-buttons">

                    <button id="playAgainBtn">
                        Play Again
                    </button>

                    <button id="resultHomeBtn">
                        Home
                    </button>

                </div>

            </div>

        </section>

    </main>

    <script src="script.js"></script>
  <!-- PWA Service Worker Registration & Update Notification -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => {
            console.log('Service Worker registered', reg);
            
            // Check for updates
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  showUpdateToast(reg);
                }
              });
            });

            // If there's already a waiting worker
            if (reg.waiting) {
              showUpdateToast(reg);
            }
          })
          .catch(err => console.error('Service Worker registration failed', err));
      });

      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });
    }

    function showUpdateToast(reg) {
      if (document.getElementById('pwa-update-toast')) return;
      
      const toast = document.createElement('div');
      toast.id = 'pwa-update-toast';
      toast.style.cssText = `
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: rgba(10, 10, 20, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        padding: 16px 20px;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        z-index: 10000;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        max-width: 320px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        box-sizing: border-box;
      `;

      if (window.innerWidth < 768) {
        toast.style.left = '20px';
        toast.style.right = '20px';
        toast.style.bottom = '20px';
        toast.style.maxWidth = 'calc(100% - 40px)';
      }

      toast.innerHTML = `
        <div style="font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px;">
          <span style="width: 8px; height: 8px; background: #5500ff; border-radius: 50%;"></span>
          Update Available
        </div>
        <div style="color: #aaa; font-size: 13px; line-height: 1.4;">A new version of VATSAL.LOL is available.</div>
        <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 4px;">
          <button id="pwa-later-btn" style="background: transparent; border: none; color: #aaa; font-weight: 500; cursor: pointer; padding: 6px 12px; font-size: 13px; outline: none;">Later</button>
          <button id="pwa-refresh-btn" style="background: #fff; border: none; color: #000; font-weight: 600; cursor: pointer; padding: 6px 16px; border-radius: 8px; font-size: 13px; outline: none; box-shadow: 0 2px 8px rgba(255,255,255,0.2);">Refresh</button>
        </div>
      `;

      document.body.appendChild(toast);

      document.getElementById('pwa-later-btn').onclick = () => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      };

      document.getElementById('pwa-refresh-btn').onclick = () => {
        if (reg.waiting) {
          reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        }
      };
    }
  </script>

</body>
</html>
