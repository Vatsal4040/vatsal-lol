<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Offline | VATSAL.LOL</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#000000">
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 20px;
      text-align: center;
      overflow: hidden;
    }
    .universe {
      position: fixed; inset: 0; z-index: -1;
      background: #000; overflow: hidden;
    }
    .stars {
      position: absolute; inset: 0;
      background-image: 
        radial-gradient(1px 1px at 20px 30px, #fff, transparent),
        radial-gradient(1.5px 1.5px at 100px 150px, #fff, transparent),
        radial-gradient(1px 1px at 200px 50px, #fff, transparent);
      background-size: 350px 350px; opacity: 0.2;
    }
    .nebula {
      position: absolute; border-radius: 50%; 
      filter: blur(120px); opacity: 0.12; pointer-events: none;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 60vw; height: 60vh; 
      background: radial-gradient(circle, #5500ff, transparent);
    }
    .card {
      background: rgba(10, 10, 20, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px 30px;
      max-width: 400px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(85, 0, 255, 0.3);
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 12px 0;
      letter-spacing: -0.5px;
    }
    p {
      color: #aaa;
      font-size: 15px;
      line-height: 1.5;
      margin: 0 0 24px 0;
    }
    .btn {
      display: inline-block;
      background: #fff;
      color: #000;
      text-decoration: none;
      font-weight: 600;
      padding: 12px 30px;
      border-radius: 12px;
      font-size: 14px;
      transition: transform 0.2s, background 0.2s;
    }
    .btn:hover {
      background: #eee;
      transform: translateY(-1px);
    }
    .btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="universe">
    <div class="stars"></div>
    <div class="nebula"></div>
  </div>
  <div class="card">
    <img src="/assets/icons/icon-192.png" alt="VATSAL.LOL Logo" class="logo">
    <h1>No Internet Connection</h1>
    <p>You can still enjoy any games that have already been downloaded.</p>
    <a href="/" class="btn">Return Home</a>
  </div>
</body>
</html>
